---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nvidia-device-plugin
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: nvidia-device-plugin
      version: '0.18.2'
      sourceRef:
        kind: HelmRepository
        name: nvdp
        namespace: flux-system
  targetNamespace: kube-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    # Run the device plugin pod with the nvidia container runtime so NVML
    # libraries are mounted into the container. Without this the plugin crashes
    # with ERROR_LIBRARY_NOT_FOUND when using the default runc runtime.
    runtimeClassName: nvidia
    # GPU time-slicing: advertise 2 virtual GPU slots from the single RTX 3070.
    # The resources list is required by the v1 config schema; omitting it causes
    # the plugin to fail with 'no resources specified'.
    config:
      map:
        default: |-
          version: v1
          flags:
            migStrategy: none
          sharing:
            timeSlicing:
              resources:
                - name: nvidia.com/gpu
                  replicas: 2

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns-docker
  namespace: flux-system
spec:
  interval: 30m
  targetNamespace: external-dns
  chart:
    spec:
      chart: external-dns
      version: '1.21.1'
      sourceRef:
        kind: HelmRepository
        name: external-dns
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    fullnameOverride: external-dns-docker

    provider:
      name: webhook
      webhook:
        image:
          repository: ghcr.io/tarantini-io/external-dns-pihole-webhook
          tag: v1.0.0
        env:
          - name: PIHOLE_PASSWORD
            valueFrom:
              secretKeyRef:
                name: pihole-docker-password
                key: password
          - name: PIHOLE_SERVER
            value: "http://192.168.1.2"
        livenessProbe:
          httpGet:
            path: /healthz
            port: http-webhook
          initialDelaySeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /readyz
            port: http-webhook
          initialDelaySeconds: 10
          timeoutSeconds: 5

    sources:
      - ingress

    domainFilters:
      - homelab.properties

    # upsert-only: creates/updates DNS records but never deletes them.
    # Safe for a homelab with manually managed Pi-hole entries.
    policy: upsert-only

    # Pi-hole does not support TXT records; noop skips ownership tracking.
    registry: noop

    logLevel: info

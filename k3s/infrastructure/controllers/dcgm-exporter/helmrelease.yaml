---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dcgm-exporter
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: dcgm-exporter
      version: '4.8.2'
      sourceRef:
        kind: HelmRepository
        name: dcgm-exporter
        namespace: flux-system
  targetNamespace: kube-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  dependsOn:
    - name: nvidia-device-plugin
  values:
    runtimeClassName: nvidia
    extraEnv:
      - name: DCGM_EXPORTER_COLLECTORS
        value: /etc/dcgm-exporter/default-counters.csv

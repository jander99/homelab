---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: node-feature-discovery
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: node-feature-discovery
      version: '0.18.3'
      sourceRef:
        kind: HelmRepository
        name: nfd
        namespace: flux-system
  targetNamespace: node-feature-discovery
  install:
    crds: CreateReplace
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  values:
    worker:
      config:
        sources:
          pci:
            # Label by PCI vendor ID only (e.g. feature.node.kubernetes.io/pci-10de.present=true)
            # for NVIDIA). The chart default also includes class+device, producing more granular
            # labels like pci-0302_10de.present. Vendor-only labels match what nvidia-device-plugin
            # uses for its default node affinity.
            deviceLabelFields:
              - vendor
    # Resource tuning (2026-06-02 krr recommendations): drop memory limits,
    # set requests to observed P95 usage. The chart default has no CPU limit
    # and unbounded memory; this pins memory to the krr recommendation.
    master:
      resources:
        requests:
          cpu: 10m
          memory: 100Mi
        limits:
          memory: 100Mi
    gc:
      resources:
        requests:
          cpu: 10m
          memory: 100Mi
        limits:
          memory: 100Mi

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 1h
  timeout: 15m
  install:
    crds: CreateReplace
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "86.3.2"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
      interval: 12h
  values:
    # K3s-specific: disable scrapers that bind to 127.0.0.1 or use SQLite
    kubeEtcd:
      enabled: false
    kubeScheduler:
      enabled: false
    kubeControllerManager:
      enabled: false
    kubeProxy:
      enabled: false

    # Drop non-essential high-cardinality _bucket metrics from the API server job.
    # Keeps the two most useful histograms (request latency + SLI) while removing
    # watch internals and request body size that are rarely dashboarded.
    kubeApiServer:
      serviceMonitor:
        metricRelabelings:
          - sourceLabels: [__name__]
            regex: "apiserver_request_body_size_bytes_bucket|apiserver_watch_cache_read_wait_seconds_bucket|apiserver_watch_events_sizes_bucket|apiserver_watch_list_duration_seconds_bucket"
            action: drop

    # K3s bundles apiserver + scheduler in the same binary, so the kubelet scrape
    # endpoint exposes those metrics too — creating duplicates of what the
    # kubeApiServer job already collects (~38k series).  Drop them here.
    kubelet:
      serviceMonitor:
        metricRelabelings:
          - sourceLabels: [__name__]
            regex: "apiserver_.*|scheduler_.*"
            action: drop
    # Resource tuning (2026-06-02 krr recommendations). KSM uses the subchart's
    # own dependency name (kube-state-metrics, hyphenated) as the values key.
    # Grafana sidecar resources is a single block — the chart applies it to all
    # 11 sidecar container definitions; per-sidecar overrides are not supported.
    # CPU limits stay unset (throttling would hurt scrape reliability on this
    # single-node cluster).
    kube-state-metrics:
      resources:
        requests:
          cpu: 10m
          memory: 127Mi
        limits:
          memory: 127Mi
    prometheusOperator:
      resources:
        requests:
          cpu: 10m
          memory: 100Mi
        limits:
          memory: 100Mi

    # Prometheus configuration
    prometheus:
      prometheusSpec:
        scrapeInterval: "60s"
        retention: 30d
        podMonitorSelectorNilUsesHelmValues: false
        serviceMonitorSelectorNilUsesHelmValues: false
        scrapeConfigSelectorNilUsesHelmValues: false
        probeSelectorNilUsesHelmValues: false
        resources:
          requests:
            cpu: 51m
            memory: 966Mi
          limits:
            memory: 2Gi
        storageSpec:
          volumeClaimTemplate:
            spec:
              accessModes:
                - ReadWriteOnce
              storageClassName: local-path
              resources:
                requests:
                  storage: 20Gi
      ingress:
        enabled: true
        ingressClassName: traefik
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-prod
        hosts:
          - prometheus.homelab.properties
        tls:
          - secretName: prometheus-tls
            hosts:
              - prometheus.homelab.properties

    # Alertmanager: PagerDuty via SOPS secret, 1Gi PVC storage
    alertmanager:
      alertmanagerSpec:
        configSecret: alertmanager-pagerduty-config
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            memory: 128Mi
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: local-path
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 1Gi
      ingress:
        enabled: true
        ingressClassName: traefik
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-prod
        hosts:
          - alertmanager.homelab.properties
        tls:
          - secretName: alertmanager-tls
            hosts:
              - alertmanager.homelab.properties

    # Grafana: SOPS-backed secret, persistent storage
    grafana:
      resources:
        requests:
          cpu: 20m
          memory: 900Mi
        limits:
          memory: 1Gi
      initChownData:
        enabled: false
      sidecar:
        resources:
          requests:
            cpu: 10m
            memory: 100Mi
          limits:
            memory: 100Mi

      envFromSecret: grafana-oidc-secret
      grafana.ini:
        server:
          root_url: https://grafana.homelab.properties
        auth.generic_oauth:
          enabled: true
          name: Authentik
          allow_sign_up: true
          client_id: grafana
          client_secret: $__env{GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET}
          scopes: openid email profile
          auth_url: https://auth.homelab.properties/application/o/authorize/
          token_url: https://auth.homelab.properties/application/o/token/
          api_url: https://auth.homelab.properties/application/o/userinfo
          email_attribute_path: email
          login_attribute_path: preferred_username
          name_attribute_path: name
          role_attribute_path: "contains(groups[*], 'homelab-admins') && 'Admin' || 'Viewer'"
      admin:
        existingSecret: grafana-admin-secret
        userKey: admin-user
        passwordKey: admin-password
      persistence:
        enabled: true
        type: pvc
        accessModes:
          - ReadWriteOnce
        size: 5Gi
        storageClassName: local-path
      ingress:
        enabled: true
        ingressClassName: traefik
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-prod
        hosts:
          - grafana.homelab.properties
        tls:
          - secretName: grafana-tls
            hosts:
              - grafana.homelab.properties

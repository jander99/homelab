---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 1h
  timeout: 15m
  install:
    crds: CreateReplace
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  chart:
    spec:
      chart: kube-prometheus-stack
      version: ">=84.0.0 <85.0.0"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
      interval: 12h
  values:
    # K3s-specific: disable scrapers that bind to 127.0.0.1 or use SQLite
    kubeEtcd:
      enabled: false
    kubeScheduler:
      enabled: false
    kubeControllerManager:
      enabled: false
    kubeProxy:
      enabled: false

    # Prometheus configuration
    prometheus:
      prometheusSpec:
        scrapeInterval: "60s"
        retention: 30d
        podMonitorSelectorNilUsesHelmValues: false
        serviceMonitorSelectorNilUsesHelmValues: false
        storageSpec:
          volumeClaimTemplate:
            spec:
              accessModes:
                - ReadWriteOnce
              storageClassName: local-path
              resources:
                requests:
                  storage: 20Gi
      ingress:
        enabled: true
        ingressClassName: traefik
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-prod
        hosts:
          - prometheus.homelab.properties
        tls:
          - secretName: prometheus-tls
            hosts:
              - prometheus.homelab.properties

    # Alertmanager: null receiver only, emptyDir storage
    alertmanager:
      alertmanagerSpec:
        storage: {}
      config:
        global:
          resolve_timeout: 5m
        route:
          group_by:
            - namespace
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 12h
          receiver: "null"
        receivers:
          - name: "null"
        inhibit_rules: []
      ingress:
        enabled: true
        ingressClassName: traefik
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-prod
        hosts:
          - alertmanager.homelab.properties
        tls:
          - secretName: alertmanager-tls
            hosts:
              - alertmanager.homelab.properties

    # Grafana: SOPS-backed secret, persistent storage
    grafana:
      admin:
        existingSecret: grafana-admin-secret
        userKey: admin-user
        passwordKey: admin-password
      persistence:
        enabled: true
        type: pvc
        accessModes:
          - ReadWriteOnce
        size: 5Gi
        storageClassName: local-path
      ingress:
        enabled: true
        ingressClassName: traefik
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-prod
        hosts:
          - grafana.homelab.properties
        tls:
          - secretName: grafana-tls
            hosts:
              - grafana.homelab.properties

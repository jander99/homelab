---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
spec:
  interval: 1h
  timeout: 15m
  install:
    crds: CreateReplace
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  chart:
    spec:
      chart: kube-prometheus-stack
      version: ">=84.0.0 <85.0.0"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
      interval: 12h
  values:
    # K3s-specific: disable scrapers that bind to 127.0.0.1 or use SQLite
    kubeEtcd:
      enabled: false
    kubeScheduler:
      enabled: false
    kubeControllerManager:
      enabled: false
    kubeProxy:
      enabled: false

    # Drop non-essential high-cardinality _bucket metrics from the API server job.
    # Keeps the two most useful histograms (request latency + SLI) while removing
    # watch internals and request body size that are rarely dashboarded.
    kubeApiServer:
      serviceMonitor:
        metricRelabelings:
          - sourceLabels: [__name__]
            regex: "apiserver_request_body_size_bytes_bucket|apiserver_watch_cache_read_wait_seconds_bucket|apiserver_watch_events_sizes_bucket|apiserver_watch_list_duration_seconds_bucket"
            action: drop

    # K3s bundles apiserver + scheduler in the same binary, so the kubelet scrape
    # endpoint exposes those metrics too — creating duplicates of what the
    # kubeApiServer job already collects (~38k series).  Drop them here.
    kubelet:
      serviceMonitor:
        metricRelabelings:
          - sourceLabels: [__name__]
            regex: "apiserver_.*|scheduler_.*"
            action: drop

    # Prometheus configuration
    prometheus:
      prometheusSpec:
        scrapeInterval: "60s"
        retention: 30d
        podMonitorSelectorNilUsesHelmValues: false
        serviceMonitorSelectorNilUsesHelmValues: false
        storageSpec:
          volumeClaimTemplate:
            spec:
              accessModes:
                - ReadWriteOnce
              storageClassName: local-path
              resources:
                requests:
                  storage: 20Gi
      ingress:
        enabled: true
        ingressClassName: traefik
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-prod
          traefik.ingress.kubernetes.io/router.middlewares: monitoring-authentik-forwardauth@kubernetescrd
        hosts:
          - prometheus.homelab.properties
        tls:
          - secretName: prometheus-tls
            hosts:
              - prometheus.homelab.properties

    # Alertmanager: null receiver only, emptyDir storage
    alertmanager:
      alertmanagerSpec:
        storage: {}
      config:
        global:
          resolve_timeout: 5m
        route:
          group_by:
            - namespace
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 12h
          receiver: "null"
        receivers:
          - name: "null"
        inhibit_rules: []
      ingress:
        enabled: true
        ingressClassName: traefik
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-prod
          traefik.ingress.kubernetes.io/router.middlewares: monitoring-authentik-forwardauth@kubernetescrd
        hosts:
          - alertmanager.homelab.properties
        tls:
          - secretName: alertmanager-tls
            hosts:
              - alertmanager.homelab.properties

    # Grafana: SOPS-backed secret, persistent storage
    grafana:
      initChownData:
        enabled: false
      envFromSecret: grafana-oidc-secret
      grafana.ini:
        server:
          root_url: https://grafana.homelab.properties
        auth.generic_oauth:
          enabled: true
          name: Authentik
          allow_sign_up: true
          client_id: grafana
          client_secret: $__env{GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET}
          scopes: openid email profile
          auth_url: https://auth.homelab.properties/application/o/authorize/
          token_url: https://auth.homelab.properties/application/o/token/
          api_url: https://auth.homelab.properties/application/o/userinfo
          email_attribute_path: email
          login_attribute_path: preferred_username
          name_attribute_path: name
          role_attribute_path: "contains(groups[*], 'homelab-admins') && 'Admin' || 'Viewer'"
      admin:
        existingSecret: grafana-admin-secret
        userKey: admin-user
        passwordKey: admin-password
      persistence:
        enabled: true
        type: pvc
        accessModes:
          - ReadWriteOnce
        size: 5Gi
        storageClassName: local-path
      ingress:
        enabled: true
        ingressClassName: traefik
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-prod
        hosts:
          - grafana.homelab.properties
        tls:
          - secretName: grafana-tls
            hosts:
              - grafana.homelab.properties

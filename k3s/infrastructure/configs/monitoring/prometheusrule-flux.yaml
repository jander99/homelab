---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: flux-alerts
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: flux.rules
      rules:
        - alert: FluxReconciliationFailed
          expr: |
            max by (namespace, name, kind) (
              gotk_reconcile_condition{type="Ready",status="False"}
            ) == 1
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: "Flux {{ $labels.kind }} {{ $labels.namespace }}/{{ $labels.name }} reconciliation failed"
            description: "Flux resource has been in a failed Ready state for more than 10 minutes."
        - alert: FluxReconciliationStale
          expr: |
            increase(gotk_reconcile_duration_seconds_count{kind="Kustomization"}[30m]) == 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Flux {{ $labels.kind }} {{ $labels.namespace }}/{{ $labels.name }} not reconciling"
            description: "Flux Kustomization has not reconciled in the last 30 minutes (expected every 5-10m)."

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: authentik-ldap-outpost
  namespace: authentik
  labels:
    app: authentik-ldap-outpost
spec:
  replicas: 1
  selector:
    matchLabels:
      app: authentik-ldap-outpost
  template:
    metadata:
      labels:
        app: authentik-ldap-outpost
    spec:
      containers:
        - name: ldap
          image: ghcr.io/goauthentik/ldap:2026.2.2
          env:
            - name: AUTHENTIK_HOST
              value: "http://authentik-server.authentik.svc.cluster.local"
            - name: AUTHENTIK_HOST_BROWSER
              value: "https://auth.homelab.properties"
            - name: AUTHENTIK_INSECURE
              value: "true"
            - name: AUTHENTIK_TOKEN
              valueFrom:
                secretKeyRef:
                  name: authentik-secret
                  key: ldap-outpost-token
          ports:
            - containerPort: 3389
              name: ldap
---
apiVersion: v1
kind: Service
metadata:
  name: authentik-ldap-outpost
  namespace: authentik
spec:
  selector:
    app: authentik-ldap-outpost
  ports:
    - name: ldap
      port: 3389
      targetPort: 3389

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: authentik
spec:
  interval: 1h
  timeout: 15m
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: authentik
      version: "2026.2.2"
      sourceRef:
        kind: HelmRepository
        name: authentik
        namespace: authentik
      interval: 12h
  valuesFrom:
    - kind: Secret
      name: authentik-secret
      valuesKey: AUTHENTIK_SECRET_KEY
      targetPath: authentik.secret_key
    - kind: Secret
      name: authentik-secret
      valuesKey: AUTHENTIK_BOOTSTRAP_PASSWORD
      targetPath: authentik.bootstrap.password
    - kind: Secret
      name: authentik-secret
      valuesKey: AUTHENTIK_BOOTSTRAP_TOKEN
      targetPath: authentik.bootstrap.token
    - kind: Secret
      name: authentik-secret
      valuesKey: postgresql-password
      targetPath: postgresql.auth.password
    - kind: Secret
      name: authentik-secret
      valuesKey: redis-password
      targetPath: redis.auth.password
    - kind: Secret
      name: authentik-secret
      valuesKey: grafana-oidc-client-secret
      targetPath: authentik.env.GRAFANA_OIDC_CLIENT_SECRET
    - kind: Secret
      name: authentik-secret
      valuesKey: headlamp-oidc-client-secret
      targetPath: authentik.env.HEADLAMP_OIDC_CLIENT_SECRET
    - kind: Secret
      name: authentik-secret
      valuesKey: outpost-token
      targetPath: authentik.env.OUTPOST_TOKEN
    - kind: Secret
      name: authentik-secret
      valuesKey: postgresql-password
      targetPath: authentik.postgresql.password
    - kind: Secret
      name: authentik-secret
      valuesKey: redis-password
      targetPath: authentik.redis.password
  values:
    authentik:
      postgresql:
        host: "authentik-postgresql"
        name: authentik
        user: authentik
      redis:
        host: "authentik-redis-master"

    postgresql:
      enabled: true
      auth:
        username: authentik
        database: authentik
      primary:
        persistence:
          size: 2Gi
          storageClass: local-path

    redis:
      enabled: true
      auth:
        enabled: true
      master:
        persistence:
          size: 512Mi
          storageClass: local-path

    server:
      ingress:
        enabled: true
        ingressClassName: traefik
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-prod
          traefik.ingress.kubernetes.io/router.entrypoints: websecure
        hosts:
          - auth.homelab.properties
        tls:
          - secretName: authentik-tls
            hosts:
              - auth.homelab.properties
      extraVolumes:
        - name: custom-blueprints
          configMap:
            name: authentik-blueprints
      extraVolumeMounts:
        - name: custom-blueprints
          mountPath: /blueprints/custom

    worker:
      extraVolumes:
        - name: custom-blueprints
          configMap:
            name: authentik-blueprints
      extraVolumeMounts:
        - name: custom-blueprints
          mountPath: /blueprints/custom

---
# bootstrap-k3s.yml
# Installs K3s on provisioned nodes.
# Run AFTER provision-nodes.yml completes successfully.
#
# Usage: ansible-playbook -i inventory/hosts.yml playbooks/bootstrap-k3s.yml -v

- name: Install and configure K3s server
  hosts: k3s_servers
  become: true
  roles:
    - k3s-server

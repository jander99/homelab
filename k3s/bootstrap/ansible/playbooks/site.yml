---
# site.yml
# Full cluster bootstrap — runs all phases in order.
# NOTE: Phase 3 (bootstrap-flux) requires GITHUB_TOKEN in the environment and
#       Flux GitHub settings in inventory/group_vars/all.yml.
#
# Usage: ansible-playbook -i inventory/hosts.yml playbooks/site.yml -v

- name: Phase 1 — Provision nodes
  ansible.builtin.import_playbook: provision-nodes.yml

- name: Phase 2 — Bootstrap K3s
  ansible.builtin.import_playbook: bootstrap-k3s.yml

- name: Phase 3 — Bootstrap Flux CD
  ansible.builtin.import_playbook: bootstrap-flux.yml

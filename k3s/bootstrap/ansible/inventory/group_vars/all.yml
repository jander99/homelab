---
# Variables applied to all hosts

timezone: America/New_York

# Packages installed on every node
common_packages:
  - python3
  - python3-pip
  - curl
  - wget
  - git
  - vim
  - htop
  - unzip
  - jq
  - update-notifier-common

# UFW rules — K3s required ports + SSH
k3s_firewall_rules:
  - { port: 22,    proto: tcp, comment: "SSH" }
  - { port: 6443,  proto: tcp, comment: "Kubernetes API server" }
  - { port: 10250, proto: tcp, comment: "Kubelet API" }
  - { port: 8472,  proto: udp, comment: "Flannel VXLAN" }
  - { port: 51820, proto: udp, comment: "Flannel WireGuard (optional)" }
# Etcd peer/client ports are HA-only; see BOOTSTRAP.md Part 2 for HA upgrade path.

# Kernel modules required for K3s / Kubernetes networking
k3s_kernel_modules:
  - br_netfilter
  - overlay

# sysctl settings required for Kubernetes networking
k3s_sysctl_params:
  net.bridge.bridge-nf-call-iptables: 1
  net.bridge.bridge-nf-call-ip6tables: 1
  net.ipv4.ip_forward: 1
  vm.swappiness: 0

# K3s version installed on all nodes — pin to a specific release.
# Find the latest: https://github.com/k3s-io/k3s/releases
k3s_version: "v1.36.0+k3s1"

# K3s built-in components to disable — these are replaced by external controllers.
# servicelb (klipper-lb) must be disabled when MetalLB is installed to prevent
# both controllers competing for LoadBalancer services.
k3s_disable_components:
  - servicelb

# ─── Flux CD bootstrap settings ─────────────────────────────────────────────
# Environment-specific values for the flux-bootstrap role.
# These override the empty role defaults in roles/flux-bootstrap/defaults/main.yml.
flux_github_owner: "jander99"
flux_github_repo: "homelab"
flux_git_branch: "master"

# ─── K3s OIDC settings ───────────────────────────────────────────────────────
# Configures the K3s API server to validate OIDC tokens issued by Authentik.
# These values enable Headlamp SSO via the headlamp application in Authentik.
k3s_oidc_issuer_url: "https://auth.homelab.properties/application/o/headlamp/"
k3s_oidc_client_id: "headlamp"
k3s_oidc_username_claim: "preferred_username"
k3s_oidc_groups_claim: "groups"

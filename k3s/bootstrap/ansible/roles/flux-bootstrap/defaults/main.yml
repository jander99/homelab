---
# roles/flux-bootstrap/defaults/main.yml
# Override these in group_vars/all.yml or inventory host_vars as needed.

# ─── Flux CLI ────────────────────────────────────────────────────────────────
# Pinned version — check https://github.com/fluxcd/flux2/releases for updates.
flux_cli_version: "2.3.0"

# Optional SHA256 checksum for the flux CLI archive (without the 'sha256:' prefix).
# Find at: https://github.com/fluxcd/flux2/releases/download/v{{ flux_cli_version }}/flux_{{ flux_cli_version }}_checksums.txt
# Leave empty to skip verification (not recommended for production).
flux_cli_checksum: ""

# Directory where the flux binary is installed on the Ansible controller.
flux_install_dir: "{{ lookup('env', 'HOME') }}/.local/bin"

# GitHub repository settings ──────────────────────────────────────────────
# Leaving these empty here prevents accidentally bootstrapping against the wrong repo when the role is reused.
flux_github_owner: ""
flux_github_repo: ""
flux_git_branch: ""

# Path inside the repo that flux bootstrap watches.
# flux bootstrap github commits flux-system/ inside this directory.
flux_cluster_path: "k3s/clusters/homelab"

# ─── Kubeconfig ──────────────────────────────────────────────────────────────
# The k3s-server role fetches the kubeconfig here.
# k3s_kubeconfig_local_file is defined in roles/k3s-server/defaults/main.yml.
# This default shadows it so that flux-bootstrap can be called standalone.
flux_kubeconfig: "{{ k3s_kubeconfig_local_file | default(lookup('env', 'HOME') + '/.kube/k3s-' + inventory_hostname + '.yaml') }}"

# ─── SOPS / age ──────────────────────────────────────────────────────────────
# Name and namespace of the Kubernetes Secret that Flux uses for SOPS decryption.
sops_secret_name: "sops-age"
sops_secret_namespace: "flux-system"

# Where the age private key is stored on the Ansible controller.
# IMPORTANT: Back this file up outside of Git and outside this machine.
# Losing it means encrypted secrets can no longer be decrypted.
age_key_file: "{{ lookup('env', 'HOME') }}/.kube/k3s-homelab-age.agekey"

# Directory where age and age-keygen are installed on the Ansible controller.
age_install_dir: "{{ lookup('env', 'HOME') }}/.local/bin"

# Pinned age version — check https://github.com/FiloSottile/age/releases for updates.
age_version: "1.2.0"

# Optional SHA256 checksum for the age archive (without the 'sha256:' prefix).
# Find at: https://github.com/FiloSottile/age/releases/download/v{{ age_version }}/age-v{{ age_version }}-linux-amd64.tar.gz.sha256
# Leave empty to skip verification (not recommended for production).
age_checksum: ""

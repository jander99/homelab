---
# roles/nvidia-gpu/tasks/main.yml
# Installs nvidia-container-toolkit and libnvidia-encode (required for NVENC GPU
# transcoding). K3s 1.35+ auto-detects the NVIDIA container runtime at startup
# and adds it to containerd config automatically.
# Assumes base NVIDIA drivers are already installed on the node (e.g. via
# nvidia-headless-no-dkms-*-server-open). libnvidia-encode is a separate package
# not included in the headless variant; without it NVENC encoding fails inside
# containers even when the GPU is visible.
#
# Tested against: Ubuntu 26.04, K3s 1.35.x (containerd 2.x)

# ── 1. Prerequisites ─────────────────────────────────────────────────────────

- name: Install gnupg and curl for toolkit repo setup
  ansible.builtin.apt:
    name:
      - curl
      - gnupg
    state: present
    update_cache: false

# ── 2. nvidia-container-toolkit ─────────────────────────────────────────────
- name: Download and dearmor NVIDIA container toolkit GPG key
  ansible.builtin.shell:
    cmd: >
      curl -fsSL https://nvidia.github.io/libnvidia-container/gpgkey
      | gpg --dearmor -o /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg
    creates: /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg

- name: Add NVIDIA container toolkit apt repo
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/nvidia-container-toolkit.list
    mode: "0644"
    content: |
      deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://nvidia.github.io/libnvidia-container/stable/deb/$(ARCH) /

- name: Install nvidia-container-toolkit and NVENC encode library
  ansible.builtin.apt:
    name:
      - nvidia-container-toolkit
      - libnvidia-encode-595-server
    state: present
    update_cache: true
  notify: Restart k3s

# ── 2. Restart k3s so it regenerates config.toml with NVIDIA runtime ─────────
# K3s detects nvidia-container-runtime at startup and registers it automatically.
# No custom containerd template needed.

- name: Gather service facts (needed by restart handler)
  ansible.builtin.service_facts:

# ── 3. Verify ─────────────────────────────────────────────────────────────────

- name: Verify nvidia-container-cli can see the GPU
  ansible.builtin.command: nvidia-container-cli info
  register: ctk_info
  changed_when: false
  failed_when: ctk_info.rc != 0

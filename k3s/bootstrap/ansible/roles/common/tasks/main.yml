---
# roles/common/tasks/main.yml
# Base OS hardening and package management for all K3s nodes

- name: Validate required variables are defined and non-empty
  ansible.builtin.assert:
    that:
      - k3s_firewall_rules is defined
      - k3s_firewall_rules | length > 0
      - common_packages is defined
      - common_packages | length > 0
      - timezone is defined
      - timezone | length > 0
    fail_msg: >-
      Required variables are missing or empty. Ensure you are running
      ansible-playbook from k3s/bootstrap/ansible/ so that ansible.cfg
      and group_vars/all.yml are picked up correctly.
    quiet: true

- name: Update apt cache and upgrade all packages
  ansible.builtin.apt:
    update_cache: true
    upgrade: dist
    cache_valid_time: 3600

- name: Install common packages
  ansible.builtin.apt:
    name: "{{ common_packages }}"
    state: present
- name: Configure passwordless sudo for k3s user
  ansible.builtin.copy:
    dest: /etc/sudoers.d/k3s-nopasswd
    content: "k3s ALL=(ALL) NOPASSWD: ALL\n"
    mode: "0440"
    validate: 'visudo -cf %s'

- name: Set system timezone
  community.general.timezone:
    name: "{{ timezone }}"

- name: Ensure UFW is installed
  ansible.builtin.apt:
    name: ufw
    state: present

- name: Set UFW default policy — deny incoming, allow outgoing
  community.general.ufw:
    direction: "{{ item.direction }}"
    policy: "{{ item.policy }}"
  loop:
    - { direction: incoming, policy: deny }
    - { direction: outgoing, policy: allow }

- name: Allow required K3s ports through UFW
  community.general.ufw:
    rule: allow
    port: "{{ item.port }}"
    proto: "{{ item.proto }}"
    comment: "{{ item.comment }}"
  loop: "{{ k3s_firewall_rules }}"

- name: Enable UFW
  community.general.ufw:
    state: enabled
  notify: Reload UFW


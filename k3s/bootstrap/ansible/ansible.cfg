[defaults]
inventory           = inventory/hosts.yml
roles_path          = roles
remote_user         = k3s
private_key_file    = ~/.ssh/k3s_cluster
host_key_checking   = False
interpreter_python  = /usr/bin/python3
stdout_callback     = yaml
bin_ansible_callbacks = True

[privilege_escalation]
become        = True
become_method = sudo
become_user   = root
become_flags  = -H -S

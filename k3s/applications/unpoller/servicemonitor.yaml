apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: unpoller
  namespace: unpoller
  labels:
    app.kubernetes.io/name: unpoller
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: unpoller
  namespaceSelector:
    matchNames:
      - unpoller
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s

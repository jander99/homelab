---
# external-dns-k3s: manages DNS records in the K3s Pi-hole instance.
#
# Collocated with k3s/applications/pihole/ because this HelmRelease has a
# hard startup dependency on the Pi-hole web API
# (http://pihole-web.pihole.svc.cluster.local). The webhook provider
# authenticates to Pi-hole on startup and exits fatally if Pi-hole is not
# reachable — triggering CrashLoopBackOff on fresh node boots.
#
# The initContainer below waits until the Pi-hole web API responds before
# allowing the ExternalDNS/webhook containers to start.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-dns-k3s
  namespace: flux-system
spec:
  interval: 30m
  targetNamespace: external-dns
  chart:
    spec:
      chart: external-dns
      version: '1.21.1'
      sourceRef:
        kind: HelmRepository
        name: external-dns
        namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    fullnameOverride: external-dns-k3s

    provider:
      name: webhook
      webhook:
        image:
          repository: ghcr.io/tarantini-io/external-dns-pihole-webhook
          tag: v1.0.0
        env:
          - name: PIHOLE_PASSWORD
            valueFrom:
              secretKeyRef:
                name: pihole-k3s-password
                key: password
          - name: PIHOLE_SERVER
            value: "http://pihole-web.pihole.svc.cluster.local"
        livenessProbe:
          httpGet:
            path: /healthz
            port: http-webhook
          initialDelaySeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /readyz
            port: http-webhook
          initialDelaySeconds: 10
          timeoutSeconds: 5
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            memory: 64Mi

    # Gate startup on Pi-hole web API being reachable.
    # The webhook provider authenticates to POST /api/auth immediately on
    # start and exits fatally if Pi-hole is not ready — causing
    # CrashLoopBackOff on node boots where Pi-hole starts later than
    # ExternalDNS. This initContainer polls until Pi-hole responds before
    # allowing the main containers to start.
    initContainers:
      - name: wait-for-pihole
        image: busybox:1.36
        securityContext:
          runAsUser: 65534
          runAsNonRoot: true
        command:
          - sh
          - -c
          - |
            echo "Waiting for Pi-hole web API at http://pihole-web.pihole.svc.cluster.local ..."
            until nc -z pihole-web.pihole.svc.cluster.local 80; do
              echo "Pi-hole not ready, retrying in 5s..."
              sleep 5
            done
            echo "Pi-hole is ready."

    sources:
      - ingress

    domainFilters:
      - homelab.properties

    # upsert-only: creates/updates DNS records but never deletes them.
    # Safe for a homelab with manually managed Pi-hole entries.
    policy: upsert-only

    # Pi-hole does not support TXT records; noop skips ownership tracking.
    registry: noop

    logLevel: info

    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        memory: 128Mi

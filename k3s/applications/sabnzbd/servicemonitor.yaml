apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: sabnzbd-exportarr
  namespace: sabnzbd
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: sabnzbd
  endpoints:
    - port: metrics
      path: /metrics
      interval: 4m
      scrapeTimeout: 90s
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: sabnzbd-gluetun
  namespace: sabnzbd
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: sabnzbd
  endpoints:
    - port: gluetun-metrics
      path: /metrics
      interval: 4m
      scrapeTimeout: 90s

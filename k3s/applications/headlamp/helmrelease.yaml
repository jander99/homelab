---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
  namespace: headlamp
spec:
  interval: 1h
  timeout: 5m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: headlamp
      version: "0.41.*"
      sourceRef:
        kind: HelmRepository
        name: headlamp
        namespace: flux-system
      interval: 12h
  values:
    service:
      type: LoadBalancer
      loadBalancerIP: 192.168.1.219
    config:
      inCluster: true
    clusterRoleBinding:
      clusterRoleName: cluster-admin

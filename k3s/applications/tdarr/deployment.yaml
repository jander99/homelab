---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tdarr-node
  namespace: tdarr
  labels:
    app: tdarr-node
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: tdarr-node
  template:
    metadata:
      labels:
        app: tdarr-node
    spec:
      runtimeClassName: nvidia
      securityContext:
        fsGroup: 100
      initContainers:
        - name: verify-nfs-mount
          image: busybox:latest
          command:
            - sh
            - -c
            - |
              if ! grep -q ' /mnt/synology/media nfs4 ' /host-proc/mounts; then
                echo 'ERROR: /mnt/synology/media is not mounted as nfs4 — refusing to start'
                exit 1
              fi
              echo 'NFS4 mountpoint verified'
          volumeMounts:
            - name: host-proc-mounts
              mountPath: /host-proc/mounts
              readOnly: true
      containers:
        - name: tdarr-node
          image: haveagitgat/tdarr_node:latest
          env:
            - name: TZ
              value: America/New_York
            - name: PUID
              value: "1027"
            - name: PGID
              value: "100"
            - name: inContainer
              value: "true"
            - name: ffmpegVersion
              value: "7"
            - name: serverURL
              value: "http://192.168.1.20:8266"
            - name: nodeName
              value: "k3s-rtx3070"
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: all
            - name: NVIDIA_VISIBLE_DEVICES
              value: all
            - name: transcodecpuWorkers
              value: "0"
            - name: transcodegpuWorkers
              value: "1"
            - name: healthcheckcpuWorkers
              value: "1"
            - name: healthcheckgpuWorkers
              value: "0"
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 4Gi
              nvidia.com/gpu: "1"
          volumeMounts:
            - name: media
              mountPath: /media
            - name: transcode-cache
              mountPath: /tmp
            - name: config
              mountPath: /app/configs
      volumes:
        - name: media
          hostPath:
            path: /mnt/synology/media
            type: Directory
        - name: transcode-cache
          emptyDir:
            sizeLimit: 200Gi
        - name: config
          persistentVolumeClaim:
            claimName: tdarr-node-config
        - name: host-proc-mounts
          hostPath:
            path: /proc/mounts
            type: File

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tdarr-server
  namespace: tdarr
  labels:
    app: tdarr-server
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: tdarr-server
  template:
    metadata:
      labels:
        app: tdarr-server
        app.kubernetes.io/name: tdarr-server
    spec:
      securityContext:
        fsGroup: 100
      containers:
        - name: tdarr-server
          image: haveagitgat/tdarr:2.78.01
          env:
            - name: TZ
              value: America/New_York
            - name: PUID
              value: "1027"
            - name: PGID
              value: "100"
            - name: inContainer
              value: "true"
            - name: ffmpegVersion
              value: "7"
            - name: serverIP
              value: "0.0.0.0"
            - name: serverPort
              value: "8266"
            - name: webUIPort
              value: "8265"
            - name: internalNode
              value: "false"
          ports:
            - name: webui
              containerPort: 8265
              protocol: TCP
            - name: server
              containerPort: 8266
              protocol: TCP
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              cpu: 1000m
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /api/v2/status
              port: 8265
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /api/v2/status
              port: 8265
            initialDelaySeconds: 15
            periodSeconds: 15
            failureThreshold: 3
          volumeMounts:
            - name: server-data
              mountPath: /app/server
            - name: config
              mountPath: /app/configs
            - name: media
              mountPath: /media
      volumes:
        - name: server-data
          persistentVolumeClaim:
            claimName: tdarr-server-data
        - name: config
          persistentVolumeClaim:
            claimName: tdarr-node-config
        - name: media
          persistentVolumeClaim:
            claimName: tdarr-media

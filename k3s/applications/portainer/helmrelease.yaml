---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: portainer
  namespace: portainer
spec:
  interval: 1h
  timeout: 5m
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: portainer
      version: "239.2.0"
      sourceRef:
        kind: HelmRepository
        name: portainer
        namespace: flux-system
      interval: 12h
  values:
    replicaCount: 1

    service:
      type: ClusterIP
      httpPort: 9000

    ingress:
      enabled: true
      ingressClassName: traefik
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
        traefik.ingress.kubernetes.io/router.entrypoints: websecure
      hosts:
        - host: portainer.homelab.properties
          paths:
            - path: /
              pathType: Prefix
      tls:
        - secretName: portainer-tls
          hosts:
            - portainer.homelab.properties

    persistence:
      enabled: true
      size: "10Gi"
      storageClass: local-path
      accessMode: ReadWriteOnce

    resources:
      requests:
        cpu: 10m
        memory: 128Mi
      limits:
        memory: 256Mi

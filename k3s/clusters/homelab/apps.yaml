---
# k3s/clusters/homelab/apps.yaml
# Flux Kustomization — applications layer.
#
# Applies rendered workload manifests from k3s/applications/. These are
# generated by `nx run cdk8s:synth` and committed to the repo.
# Depends on platform (namespaces) and infra-configs (controllers + config)
# so workloads land after the cluster plumbing is fully ready.
# SOPS decryption is enabled here for any application secrets committed
# as *.sops.yaml files.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 5m
  retryInterval: 2m
  path: ./k3s/applications
  prune: true
  wait: true
  timeout: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: platform
    - name: infra-configs
  decryption:
    provider: sops
    secretRef:
      name: sops-age

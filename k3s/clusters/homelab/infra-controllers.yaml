---
# k3s/clusters/homelab/infra-controllers.yaml
# Flux Kustomization — infrastructure controllers layer.
#
# Applies cluster-scoped controllers (cert-manager, ingress-nginx, etc.)
# from k3s/infrastructure/controllers/. Depends on platform so that the
# target namespaces exist before controllers are installed.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-controllers
  namespace: flux-system
spec:
  interval: 10m
  retryInterval: 2m
  path: ./k3s/infrastructure/controllers
  prune: true
  wait: true
  timeout: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
    - name: platform

version: "3.8"

services: 
  portainer:
    image: portainer/agent:latest
    container_name: portainer
    environment:
      - TZ=America/New_York
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes
    ports:
      - 9001:9001
    network_mode: homelab_bridge_network
    restart: unless-stopped

# DEPRECATED: This service is replaced by qBittorrent running in K3s (k3s/applications/qbittorrent/).
# The Docker-based Transmission+OpenVPN stack is superseded by qBittorrent+Gluetun (WireGuard/NordVPN).
# This file is retained for reference. Do not start this service alongside the K3s deployment.
#
version: "3.8"

services:
  transmission-openvpn:
    image: haugene/transmission-openvpn:5.1.0
    container_name: transmission
    hostname: transmission
    cap_add:
      - NET_ADMIN
    environment:
      - TZ=America/New_York
      - PUID=1027
      - PGID=100
      - OVERRIDE_DNS_1=1.1.1.1
      - OVERRIDE_DNS_2=8.8.8.8
      - OPENVPN_PROVIDER=NORDVPN
      - OPENVPN_USERNAME=${NORDVPN_USER}
      - OPENVPN_PASSWORD=${NORDVPN_PASS}
      - LOCAL_NETWORK=192.168.1.0/24
      - NORDVPN_COUNTRY=US
      - NORDVPN_CATEGORY=P2P
      - NORDVPN_PROTOCOL=tcp
      - CREATE_TUN_DEVICE=true
    volumes:
      - /volume1/data/torrents:/data
      - /volume1/docker/config/transmission:/config
    ports:
      - 9091:9091
    network_mode: homelab_bridge_network
    restart: unless-stopped

  transmission-exporter:
    image: metalmatze/transmission-exporter:0.3.0
    container_name: transmission-exporter
    environment: 
      - TZ=America/New_York
      - TRANSMISSION_ADDR=http://transmission:9091
    links:
    - transmission-openvpn
    ports:
      - 19091:19091
    network_mode: homelab_bridge_network
    restart: unless-stopped
    depends_on:
      - transmission-openvpn
    
